<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Registrar Atención</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h2>Registrar Atención Veterinaria</h2>

<form th:action="@{/historial/guardar}"
      th:object="${historial}"
      method="post">

  <!-- Campo oculto para enviar la cita -->
  <input type="hidden" name="citaId" th:value="${citaId}"/>

  <div class="mb-3">
    <label class="form-label">Diagnóstico</label>
    <textarea class="form-control"
              th:field="*{diagnostico}"
              rows="3"
              required></textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Tratamiento</label>
    <textarea class="form-control"
              th:field="*{tratamiento}"
              rows="3"
              required></textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Observaciones</label>
    <textarea class="form-control"
              th:field="*{observaciones}"
              rows="3"></textarea>
  </div>

  <button type="submit" class="btn btn-success">
    Guardar Atención
  </button>

  <a th:href="@{/veterinario/agenda}"
     class="btn btn-secondary">
    Cancelar
  </a>

</form>

</body>
</html>
