<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin-panel.css}">
<script defer th:src="@{/js/admin-panel.js}"></script>
</head>
<body>
<h2>Panel de Administración</h2>
<h3>Clientes</h3>
<table>
  <tr th:each="c : ${clientes}">
    <td th:text="${c.nombre}"></td>

    <td>
      <a th:href="@{/admin/eliminarCliente/{id}(id=${c.id})}">
        Eliminar
      </a>
    </td>
  </tr>
</table>

<h3>Veterinarios</h3>
<table>
  <tr th:each="v : ${veterinarios}">
    <td th:text="${v.nombre}"></td>
    <td>
      <a th:href="@{/admin/eliminarVeterinario/{id}(id=${v.id})}">
        Eliminar
      </a>
    </td>
  </tr>
</table>

<h3>Citas</h3>
<table>
  <tr th:each="c : ${citas}">
    <td th:text="${c.fechaCita}"></td>
    <td th:text="${c.estado}"></td>
    <td>
      <button class="btn btn-info"
              data-bs-toggle="modal"
              th:data-bs-target="'#modal' + ${c.id}">
        Detalles
      </button>
    </td>

    <td>
      <a th:href="@{/admin/eliminarCita/{id}(id=${c.id})}">
        Eliminar
      </a>
    </td>
  </tr>
</table>
<div th:each="c : ${citas}">

  <div class="modal fade"
       th:id="'modal' + ${c.id}"
       tabindex="-1">

    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">
            Detalles de la Cita
          </h5>
          <button type="button"
                  class="btn-close"
                  data-bs-dismiss="modal">
          </button>
        </div>

        <div class="modal-body">

          <p><strong>Fecha:</strong>
            <span th:text="${c.fechaCita}"></span>
          </p>

          <p><strong>Hora:</strong>
            <span th:text="${c.horaCita}"></span>
          </p>

          <div th:if="${c.historialClinico != null}">

            <p><strong>Diagnóstico:</strong>
              <span th:text="${c.historialClinico.diagnostico}"></span>
            </p>

            <p><strong>Tratamiento:</strong>
              <span th:text="${c.historialClinico.tratamiento}"></span>
            </p>

            <p><strong>Observaciones:</strong>
              <span th:text="${c.historialClinico.observaciones}"></span>
            </p>

          </div>
          <div th:if="${c.historialClinico == null}">

          </div>

        </div>

      </div>
    </div>

  </div>

</div>
<a th:href="@{/admin/veterinarios/nuevo}" class="btn btn-primary">
  Crear Veterinario
</a>
<a th:href="@{/}"> atrás</a>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
