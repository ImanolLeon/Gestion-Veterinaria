<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="contenido">

    <h2 th:text="${cliente.id == null} ? 'Nuevo Cliente' : 'Editar Cliente'"></h2>

    <form th:action="@{/admin/clientes/guardar}"
          th:object="${cliente}"
          method="post">

        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label>DNI</label>
            <input type="text" class="form-control" th:field="*{dni}">
            <div class="text-danger"
                 th:if="${#fields.hasErrors('dni')}"
                 th:errors="*{dni}"></div>
        </div>

        <div class="mb-3">
            <label>Nombres</label>
            <input type="text" class="form-control" th:field="*{nombres}">
            <div class="text-danger"
                 th:if="${#fields.hasErrors('nombres')}"
                 th:errors="*{nombres}"></div>
        </div>

        <div class="mb-3">
            <label>Apellidos</label>
            <input type="text" class="form-control" th:field="*{apellidos}">
        </div>

        <div class="mb-3">
            <label>Teléfono</label>
            <input type="text" class="form-control" th:field="*{telefono}">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" th:field="*{email}">
        </div>

        <div class="mb-3">
            <label>Dirección</label>
            <input type="text" class="form-control" th:field="*{direccion}">
        </div>

        <button class="btn btn-success">Guardar</button>
        <a class="btn btn-secondary"
           th:href="@{/admin/clientes}">Cancelar</a>

    </form>

</div>

</body>
</html>
